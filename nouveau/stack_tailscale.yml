version: "3.8"
services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: jellyfin-home
    environment:
      - TS_AUTHKEY=tskey-auth-xxxx  # ← à remplacer
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    network_mode: host  # ← accès direct au réseau du Pi
    restart: unless-stopped

volumes:
  tailscale-state:
