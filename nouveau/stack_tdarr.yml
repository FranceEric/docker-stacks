services:
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    ports:
      - "8265:8265"
      - "8266:8266"
    environment:
      - PUID=1026
      - PGID=100
      - TZ=Europe/Paris
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
    volumes:
      - "/docker/appdata/tdarr/server:/app/server:rw"
      - "/docker/appdata/tdarr/configs:/app/configs:rw"
      - "/docker/appdata/tdarr/logs:/app/logs:rw"
      - "ErDownload:/storage:rw"
    restart: unless-stopped

  tdarr-node:
    image: ghcr.io/haveagitgat/tdarr_node:latest
    container_name: tdarr-node
    environment:
      - PUID=1026
      - PGID=100
      - TZ=Europe/Paris
      - serverIP=tdarr
      - serverPort=8266
      - nodeName=RaspberryPi
    volumes:
      - "/docker/appdata/tdarr/configs:/app/configs:rw"
      - "/docker/appdata/tdarr/logs:/app/logs:rw"
      - "ErDownload:/storage:rw"
    restart: unless-stopped

volumes:
  ErDownload:
    external: true
