version: '3.8'
services:
  filebrowser:
    container_name: filebrowser
    image: filebrowser/filebrowser:latest
    volumes:
      #- /opt/docker:/srv  # Arborescence qui sera visible de l'utilisateur par défaut
      - /:/srv
      - /opt/docker/filebrowser/db/filebrowser.db:/database.db
      - /opt/docker/filebrowser/conf/filebrowser.json:/filebrowser.json  # Fichier de configuration pour personnaliser certaines options
    labels:
      - com.centurylinklabs.watchtower.enable=true  # Permet de mettre à jour automatiquement le conteneur avec Watchtower
    ports:
      - 8084:80  # Port pour accéder à l'interface web de File Browser
    restart: unless-stopped

